version: '3.8'

services:
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: mac-checker-pb
    command: serve --http=0.0.0.0:8090
    ports:
      - "8090:8090"
    volumes:
      - ./pb_data:/pb_data
    restart: unless-stopped

  checker:
    build: .
    container_name: mac-checker-app
    depends_on:
      - pocketbase
    environment:
      - PB_URL=http://localhost:8090
      - PB_ADMIN_EMAIL=admin@example.com
      - PB_ADMIN_PASSWORD=change_me_12345
      - CodaToken=your_token_here
      - CodaDeviceDocumentId=your_doc_id
      - CodaDeviceTableId=your_table_id
      - CodaResultDocumentId=your_res_doc_id
      - CodaResultTableId=your_res_table_id
      - RouterIp=192.168.1.1
      - RouterUser=admin
      - RouterPassword=password
    volumes:
      - ./data:/data  # Kept in case old NeDB file needs to be imported
    restart: unless-stopped
