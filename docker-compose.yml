version: '3.8'

services:
  surrealdb:
    image: surrealdb/surrealdb:v2.1.4
    container_name: mac-checker-surreal
    command: start --log trace --user root --pass root file://data/surreal.db
    ports:
      - "8000:8000"
    volumes:
      - ./surreal_data:/data
    restart: unless-stopped

  checker:
    build: .
    container_name: mac-checker-app
    depends_on:
      - surrealdb
    environment:
      - SurrealUrl=ws://surrealdb:8000/rpc
      - SurrealUser=root
      - SurrealPass=root
      - SurrealNS=mac_checker
      - SurrealDB=mac_checker
      - RouterIp=192.168.1.1
      - RouterUser=admin
      - RouterPassword=password
      - RouterPort=8443
      - CodaApiToken=your_token_here
      - CodaDocumentId=your_doc_id
      - CodaDevicesTableId=your_table_id
      - CodaPeopleTableId=your_res_doc_id
      - API_KEYS=sample_key_1,sample_key_2
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data  # Kept in case old NeDB file needs to be imported
    restart: unless-stopped
